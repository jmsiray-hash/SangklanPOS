<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangkalan | Elite Dashboard</title>
   <link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-service.js"></script>

    <script>
        // Initialize Firebase using the service module
        FirebaseService.initFirebase().then(() => {
            console.log('Dashboard Firebase initialized');
            window.db = FirebaseService.database();
        }).catch(err => {
            console.error('Failed to initialize Firebase:', err);
        });
    </script>
    <style>
        :root {
            --accent: #38bdf8;
            --bg: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.95); /* Deeper for mobile readability */
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.08) 0px, transparent 50%);
            transition: opacity 0.3s ease;
        }

        /* --- MOBILE HAMBURGER --- */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 90;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand-section {
            padding: 0 20px 40px;
            text-align: left;
        }

        .brand-oval {
            width: 60px;
            height: 30px;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            border-radius: 50px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        /* --- ACTIVE ORDERS SECTION --- */
        .active-orders-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
        }

        .active-orders-title {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .active-orders-title .order-dot {
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .table-order-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .table-order-card:hover {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .table-order-card .table-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .table-order-card .order-count {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .table-order-card .order-total {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .no-orders-msg {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: center;
            padding: 15px;
        }

        .view-pos-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #020617;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .view-pos-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .nav-btn {
            width: 100%;
            padding: 14px 20px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 14px;
            color: var(--text-dim);
            text-align: left;
            font-size: 0.9rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--accent);
            border-color: rgba(56, 189, 248, 0.2);
            padding-left: 25px;
        }

        /* --- CONTENT AREA --- */
        .main-content {
            flex-grow: 1;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            transition: all 0.4s ease;
        }

        .header-meta {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .greeting {
            font-size: clamp(2rem, 8vw, 4rem); /* Responsive Font Size */
            font-weight: 200;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .greeting b {
            font-weight: 600;
            color: var(--text-main);
        }

        .sub-greeting {
            color: var(--text-dim);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            max-width: 500px;
            font-weight: 300;
        }

        .operation-hours {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hours-icon {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .status-pill {
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 100px;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .launch-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: fixed;
            bottom: 30px;
            right: 30px;
            overflow: hidden;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .launch-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .launch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .launch-btn svg {
            width: 24px;
            height: 24px;
        }



        /* --- MEDIA QUERIES --- */
        @media (max-width: 1024px) {
            .sidebar { width: 260px; }
            .main-content { padding: 40px; }
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; } /* Show menu on mobile */
            
            .sidebar {
                position: fixed;
                left: -300px; /* Hide sidebar off-screen */
                height: 100%;
                box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }

            .sidebar.active {
                left: 0;
            }

            .main-content {
                padding: 100px 30px 40px;
                text-align: center;
                align-items: center;
            }

            .status-pill {
                top: 25px;
                right: 25px;
            }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="brand-section">
            <div class="brand-oval"></div>
            <div class="brand-name" id="display-store-name">Sangkalan</div>
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;" id="display-branch">WEST AVENUE</p>
            <p style="font-size: 0.65rem; color: var(--text-dim); margin-top: 8px; opacity: 0.7;" id="display-address"></p>
            <p style="font-size: 0.65rem; color: var(--accent); margin-top: 4px; opacity: 0.8;" id="display-id"></p>
        </div>

        <nav class="nav-container">
            <button class="nav-btn" onclick="goTo('pos')">Ordering System</button>
            <button class="nav-btn" onclick="goTo('inventory_management')">Inventory Management</button>
            <button class="nav-btn" onclick="goTo('table_menu')">Table & Menu Management</button>
            <button class="nav-btn" onclick="goTo('setting')">System Settings</button>
        </nav>

        <div style="padding: 20px; border-top: 1px solid var(--glass-border);">
            <p style="font-size: 0.7rem; color: var(--text-dim);">Operator</p>
            <p style="font-size: 0.8rem; color: var(--text-main);" id="display-cashier">ABBY GRACE</p>
            <button class="nav-btn logout-btn" onclick="logoutOperator()" style="margin-top: 15px; background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); color: #fb7185;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16,17 21,12 16,7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout Operator
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="status-pill">
            <div class="status-dot"></div>
            <span id="status-text">SYSTEM OPERATIONAL</span>
        </div>

        <div class="header-meta">Operations Dashboard</div>
        <h1 class="greeting">Ready to serve,<br><b>Good Morning.</b></h1>
        <p class="sub-greeting">Where great food begins. Please select a module from the controller to start your shift.</p>
        <div class="operation-hours">
            <svg class="hours-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12,6 12,12 16,14"></polyline>
            </svg>
            <span id="hours-text">Operating Hours: 10:00 AM - 12:00 PM</span>
        </div>
        <button class="launch-btn" id="launch-btn" onclick="launchDay()">
            <div class="btn-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5L21 16z"/>
                </svg>
                Launch System!
            </div>
        </button>
    </main>

    <script>
        // Toggle Sidebar for Mobile
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Real-time connection to Settings Data
        function loadSettings() {
            const storeName = localStorage.getItem('store-name') || "Sangkalan";
            const branch = localStorage.getItem('store-branch') || "Main Terminal";
            const cashier = localStorage.getItem('store-cashier') || "Admin";
            const storeAddress = localStorage.getItem('store-address') || "";
            const storeId = localStorage.getItem('store-id') || "";

            document.getElementById('display-store-name').innerText = storeName;
            document.getElementById('display-branch').innerText = branch;
            document.getElementById('display-cashier').innerText = cashier;
            document.getElementById('display-address').innerText = storeAddress;
            document.getElementById('display-id').innerText = storeId ? 'ID: ' + storeId : '';

            // Load operation hours
            const openingTime = localStorage.getItem('operation-time') || "08:00";
            const closingTime = localStorage.getItem('operation-closing-time') || "22:00";

            const opening12 = convertTo12Hour(openingTime);
            const closing12 = convertTo12Hour(closingTime);

            document.getElementById('hours-text').innerText = `Operating Hours: ${opening12} - ${closing12}`;
        }

        function convertTo12Hour(time24) {
            const [hour, minute] = time24.split(':').map(Number);
            const period = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minute.toString().padStart(2, '0')} ${period}`;
        }

        // Firebase Realtime Listener for Settings
        function setupFirebaseRealtimeListener() {
            if (!window.db) return;
            
            window.db.ref('settings').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // Update localStorage with Firebase data
                    Object.keys(data).forEach(key => {
                        localStorage.setItem(key, data[key]);
                    });
                    // Refresh the UI
                    loadSettings();
                    console.log('Settings updated from Firebase:', data);
                }
            }, (error) => {
                console.error('Firebase listener error:', error);
            });
        }

        function goTo(page) {
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = page + ".html";
            }, 300);
        }

        function launchDay() {
            if (confirm('Are you sure you want to launch the day?')) {
                startNewDay();
            }
        }

        function getNext5AMPhilippine() {
            const now = new Date();
            const nowUTC = now.getTime();
            const philippineOffset = 8 * 60 * 60 * 1000; // 8 hours in ms
            const nowPhilippineUTC = nowUTC + philippineOffset;
            const next5AMPhilippineUTC = new Date(nowPhilippineUTC);
            next5AMPhilippineUTC.setUTCHours(5, 0, 0, 0);
            if (next5AMPhilippineUTC.getTime() <= nowPhilippineUTC) {
                next5AMPhilippineUTC.setUTCDate(next5AMPhilippineUTC.getUTCDate() + 1);
            }
            return next5AMPhilippineUTC;
        }

        async function startNewDay() {
            const now = new Date().toISOString();
            const disabledUntil = getNext5AMPhilippine().toISOString();

            // Store locally first
            localStorage.setItem('last_reset_time', now);
            localStorage.setItem('shift_closed', 'false');
            localStorage.setItem('takeout_counter', 0);
            localStorage.setItem('launch_disabled_until', disabledUntil);

            // Try to sync with Firebase if online
            if (navigator.onLine && window.db) {
                try {
                    const launchData = {
                        last_reset_time: now,
                        shift_closed: false,
                        takeout_counter: 0,
                        launch_disabled_until: disabledUntil,
                        timestamp: new Date()
                    };
                    await setDoc(doc(window.db, 'launch_status', 'current'), launchData);
                    console.log('Launch data synced to Firebase');
                } catch (error) {
                    console.error('Failed to sync to Firebase:', error);
                }
            }

            alert('Day launched successfully!');
            // Disable the launch button after launching until next 5 AM PHT
            const launchBtn = document.getElementById('launch-btn');
            launchBtn.disabled = true;
            launchBtn.textContent = 'Launching...';
            // Re-enable at next 5 AM PHT
            const timeUntilNext5AM = getNext5AMPhilippine().getTime() - Date.now();
            setTimeout(() => {
                checkLaunchButtonDisabled();
            }, timeUntilNext5AM);
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.menu-toggle');
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });

        window.onload = function() {
            loadSettings();
            checkShiftStatus();
            checkLaunchButtonVisibility();
            setupFirebaseRealtimeListener();

            // Automatically launch day every 18 hours
            setInterval(() => {
                const lastReset = localStorage.getItem('last_reset_time');
                if (lastReset) {
                    const timeDiff = Date.now() - new Date(lastReset).getTime();
                    if (timeDiff >= 18 * 60 * 60 * 1000) {
                        startNewDay();
                    }
                }
            }, 60000); // Check every minute
        };

        function checkLaunchButtonVisibility() {
            const hiddenUntil = localStorage.getItem('launch_hidden_until');
            const now = new Date();
            const nowUTC = now.getTime() - (now.getTimezoneOffset() * 60 * 1000);
            const launchBtn = document.getElementById('launch-btn');

            if (!hiddenUntil) {
                launchBtn.style.display = 'flex';
            } else {
                const hiddenUntilUTC = new Date(hiddenUntil).getTime();
                if (hiddenUntilUTC <= nowUTC) {
                    launchBtn.style.display = 'flex';
                } else {
                    launchBtn.style.display = 'none';
                }
            }
        }

        function isBefore5AMPhilippine() {
            const now = new Date();
            const nowUTC = now.getTime();
            const philippineOffset = 8 * 60 * 60 * 1000; // 8 hours in ms
            const nowPhilippineUTC = nowUTC + philippineOffset;
            const philippineHour = new Date(nowPhilippineUTC).getUTCHours();
            return philippineHour < 5;
        }

        function checkLaunchButtonDisabled() {
            const launchBtn = document.getElementById('launch-btn');

            if (isBefore5AMPhilippine()) {
                launchBtn.disabled = true;
                launchBtn.textContent = 'Available at 5 AM PHT';
            } else {
                launchBtn.disabled = false;
                launchBtn.innerHTML = '<div class="btn-content"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5L21 16z"/></svg>Launch System!</div>';
            }
        }

        function checkShiftStatus() {
            const isClosed = localStorage.getItem('shift_closed') === 'true';
            const statusText = document.getElementById('status-text');
            const statusDot = document.querySelector('.status-dot');

            if (isClosed) {
                statusText.innerText = 'SHIFT CLOSED';
                statusDot.style.background = '#fb7185'; // Red for closed
            } else {
                statusText.innerText = 'SYSTEM OPERATIONAL';
                statusDot.style.background = 'var(--accent)'; // Accent for operational
            }
        }

        function logoutOperator() {
            window.location.href = "index.html";
        }


    </script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
